name: YOLO
server:
  cut-layer: a # or b, c, d
  clients:
    - 9 #edge
    - 9 #cloud
  model: yolo26n
  batch-size: 32
experiment:
  enable: False  #False
  mode: only_cloud
  #mode: only_edge
rabbit:
  address: 192.168.101.91
  username: "machine-1"
  password: "123456" 
  virtual-host: /

debug-mode: False
data: video.mp4
log-path: .

ram-guard:
  enable: True          # server watches broker RAM (via management API) and pauses/resumes edge senders
  pause_ratio: 0.70     # tell edge clients to stop sending once broker mem_used/mem_limit reaches this
  resume_ratio: 0.50    # tell them to resume once it drops back to this (hysteresis avoids flapping)
  poll_interval_s: 2.0

compress:
  enable: False
  num_bit: 8

clustering:
  enable: False         # True → Hungarian tự chọn cut point; False → dùng cut-layer cố định
  num_A: 3              # num_A + num_B + num_C = clients[0] (tổng edge)
  num_B: 3
  num_C: 3
  num_cloud: 3         # = clients[1] (tổng cloud)
  max_clusters: 3      # <= min(clients[0], clients[1])
  network_rate_mb_s: 100.0
  measure_bandwidth: True # True → đo thực tế mỗi lần chạy; False → dùng network_rate_mb_s cố định
  profile_source: real     # auto → dùng real nếu có, không thì simulated; real → ép dùng real; simulated → ép dùng giả lập
